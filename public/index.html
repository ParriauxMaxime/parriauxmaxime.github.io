    <!-- Prevent flash of wrong theme / accent -->
    <script>
      (function() {
        var d = localStorage.getItem('dark');
        var dark = d !== null ? d === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
        var hue = localStorage.getItem('accent-hue');
        if (hue) document.documentElement.style.setProperty('--accent-hue', hue);
      })();
    </script>
